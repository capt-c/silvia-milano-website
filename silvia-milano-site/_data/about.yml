bio_short: >
  I work at the intersection of epistemology and AI ethics, with a current focus on recommender systems and AI assistants:
  how they shape what we know, what we value, and who we become.

bio_full: >
  I am Akademische Rätin (equivalent to Senior Lecturer or an Associate Professor in the US system) at the Technical
  University of Munich within the Chair of Philosophy and History of Science and Technology, and
  Head of Research of the Ethical Data Initiative at TUM Think Tank.

  Before joining TUM, I was a Senior Lecturer in Philosophy at the University of Exeter and a
  Humboldt Fellow at the Munich Centre for Mathematical Philosophy (LMU Munich). Prior to that,
  I spent a few years in Oxford, first as a Postdoctoral Researcher at the Oxford Internet Institute, and then as a Research Fellow in Philosophy of AI at the University of Oxford and William Golding
  Junior Research Fellow at Brasenose College. I completed my PhD in Philosophy at the London
  School of Economics and Political Science in 2018.

  My interests lie primarily in epistemology, ethics, and their intersections — especially in
  connection with Artificial Intelligence. My current research investigates epistemological and
  ethical issues relating to recommender systems and algorithmic decision making.
