<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title == "Home" %}{{ site.author }} — Philosopher, TU Munich{% else %}{{ page.title }} | {{ site.author }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:title" content="{{ page.title }} | {{ site.author }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>

  <!-- Navigation -->
  <nav>
    <div class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="nav-brand">Silvia Milano</a>
      <button class="nav-toggle" aria-label="Toggle menu" onclick="this.setAttribute('aria-expanded', this.getAttribute('aria-expanded')==='true'?'false':'true'); document.querySelector('.nav-links').classList.toggle('open')">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}"{% if page.url == "/" %} class="active"{% endif %}>Home</a></li>
        <li><a href="{{ '/research/' | relative_url }}"{% if page.url contains "research" %} class="active"{% endif %}>Research</a></li>
        <li><a href="{{ '/teaching/' | relative_url }}"{% if page.url contains "teaching" %} class="active"{% endif %}>Teaching</a></li>
        <li><a href="{{ '/news/' | relative_url }}"{% if page.url contains "news" %} class="active"{% endif %}>News</a></li>
        <li><a href="{{ '/cv/' | relative_url }}"{% if page.url contains "cv" %} class="active"{% endif %}>CV</a></li>
        <li class="nav-cta"><a href="{{ '/contact/' | relative_url }}"{% if page.url contains "contact" %} class="active"{% endif %}>Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- Main content -->
  {{ content }}

  <!-- Footer -->
  <footer>
    <div class="footer-inner">
      <span class="footer-brand">Silvia Milano</span>
      <ul class="footer-links">
<!--        <li><a href="mailto:{{ site.data.about.email }}">{{ site.data.about.email }}</a></li>  -->
        <li><a href="{{ site.data.about.scholar_url }}" target="_blank">Google Scholar</a></li>
        <li><a href="{{ site.data.about.orcid_url }}" target="_blank">ORCID</a></li>
        <li><a href="{{ site.data.about.linkedin_url }}" target="_blank">LinkedIn</a></li>
      </ul>
    </div>
  </footer>

</body>
</html>
